name: Deploy to Lightsail

on:
  push:
    branches:
      - main
    # Also redeploy when a version tag is pushed, so version.txt picks
    # up the new tag without needing a separate trigger commit.
    tags:
      - '*'

# When main and a version tag are pushed within seconds of each other
# (the usual release flow), the two workflow runs would both SSH to
# Lightsail concurrently and the second one fails. Serialize them.
concurrency:
  group: deploy-lightsail
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/admin/app/compare
            rm -f public/version.txt
            git fetch origin
            git reset --hard origin/main
            git fetch --tags
            git describe --tags --abbrev=0 2>/dev/null > public/version.txt || echo "dev" > public/version.txt
            npm ci --omit=dev
            pm2 restart CharDataApp
