    function sortCmpTable(colIdx) {
      if (_cmpSortCol === colIdx) {
        _cmpSortDir = _cmpSortDir === 'asc' ? 'desc' : 'asc';
      } else {
        _cmpSortCol = colIdx;
        _cmpSortDir = 'asc';
      }
      renderCmpTable();
    }

    function renderCmpTable() {
      if (!_cmpData) return;
      const { matches, deRaw, a, b, aColIdx, aLabIdx, bLabIdx, method, PR, TH, VL } = _cmpData;
      const LAB_LABELS = ['L*', 'a*', 'b*'];
      const CH_LABELS = ['C*', 'h*(deg)'];
      const colorantCount = a.colorants.length;

      // Build spectral lookup: two entries per display row (File A then File B)
      _spectralPopupData = [];
      _cmpSortedIdx.forEach(origIdx => {
        const { rowA, rowB } = matches[origIdx];
        const sA = extractSpectral(a.headers, rowA);
        const sB = extractSpectral(b.headers, rowB);
        _spectralPopupData.push({ ...sA, label: buildSpectralLabel(a.name, a.headers, rowA, a.colorants), color: '#4a90e2' });
        _spectralPopupData.push({ ...sB, label: buildSpectralLabel(b.name, b.headers, rowB, b.colorants), color: '#e24a4a' });
      });

      // Sorted indices
      if (_cmpSortCol !== null) {
        _cmpSortedIdx.sort((ii, jj) => {
          const vi = getSortVal(ii), vj = getSortVal(jj);
          return _cmpSortDir === 'asc' ? vi - vj : vj - vi;
        });
      }
      const sortedIdx = _cmpSortedIdx;

      function getSortVal(rowIdx) {
        const col = _cmpSortCol;
        if (col < colorantCount) {
          const v = parseFloat(matches[rowIdx].rowA[aColIdx[col]]);
          return isNaN(v) ? Infinity : v;
        }
        const rel = col - colorantCount;
        if (rel < 3) {
          const v = parseFloat(matches[rowIdx].rowA[aLabIdx[rel]]);
          return isNaN(v) ? Infinity : v;
        }
        if (rel < 5) {
          // A's C* (rel=3) or h* (rel=4)
          const ai = aLabIdx[1], bi = aLabIdx[2];
          const av = parseFloat(matches[rowIdx].rowA[ai]), bv = parseFloat(matches[rowIdx].rowA[bi]);
          if (isNaN(av) || isNaN(bv)) return Infinity;
          return rel === 3 ? Math.sqrt(av*av+bv*bv) : (Math.atan2(bv,av)*180/Math.PI+360)%360;
        }
        if (rel < 8) {
          const v = parseFloat(matches[rowIdx].rowB[bLabIdx[rel - 5]]);
          return isNaN(v) ? Infinity : v;
        }
        if (rel < 10) {
          // B's C* (rel=8) or h* (rel=9)
          const ai = bLabIdx[1], bi = bLabIdx[2];
          const av = parseFloat(matches[rowIdx].rowB[ai]), bv = parseFloat(matches[rowIdx].rowB[bi]);
          if (isNaN(av) || isNaN(bv)) return Infinity;
          return rel === 8 ? Math.sqrt(av*av+bv*bv) : (Math.atan2(bv,av)*180/Math.PI+360)%360;
        }
        const v = parseFloat(deRaw[rowIdx]);
        return isNaN(v) ? Infinity : v;
      }

      // Column headers with sort indicators
      const arrow = i => _cmpSortCol === i ? (_cmpSortDir === 'asc' ? ' ↑' : ' ↓') : '';
      const colHeaderCells = [
        ...a.colorants.map((c, i) => `<th onclick="sortCmpTable(${i})" style="${PR}${TH}cursor:pointer;">${c}${arrow(i)}</th>`),
        ...LAB_LABELS.map((l, i) => `<th onclick="sortCmpTable(${colorantCount + i})" style="${PR}${TH}${i === 0 ? VL : ''}cursor:pointer;">${l}${arrow(colorantCount + i)}</th>`),
        ...CH_LABELS.map((l, i) => `<th onclick="sortCmpTable(${colorantCount + 3 + i})" style="${PR}${TH}cursor:pointer;">${l}${arrow(colorantCount + 3 + i)}</th>`),
        ...LAB_LABELS.map((l, i) => `<th onclick="sortCmpTable(${colorantCount + 5 + i})" style="${PR}${TH}${i === 0 ? VL : ''}cursor:pointer;">${l}${arrow(colorantCount + 5 + i)}</th>`),
        ...CH_LABELS.map((l, i) => `<th onclick="sortCmpTable(${colorantCount + 8 + i})" style="${PR}${TH}cursor:pointer;">${l}${arrow(colorantCount + 8 + i)}</th>`),
        `<th onclick="sortCmpTable(${colorantCount + 10})" style="${PR}${TH}${VL}cursor:pointer;">${method}${arrow(colorantCount + 10)}</th>`
      ].join('');
      document.getElementById('cmp-col-headers').innerHTML = colHeaderCells;

      // Build and render rows
      const fmtLab = v => { const n = parseFloat(v); return isNaN(n) ? '—' : n.toFixed(3); };
      const colorantCols = aColIdx.map(i => alignDecimals(sortedIdx.map(ri => matches[ri].rowA[i] ?? '')));
      const aLabCols = aLabIdx.map(i => sortedIdx.map(ri => i !== -1 ? fmtLab(matches[ri].rowA[i]) : '—'));
      const bLabCols = bLabIdx.map(i => sortedIdx.map(ri => i !== -1 ? fmtLab(matches[ri].rowB[i]) : '—'));
      const deCol = alignDecimals(sortedIdx.map(i => deRaw[i]));

      const calcCH = (row, labIdx) => {
        const ai = labIdx[1], bi = labIdx[2];
        if (ai === -1 || bi === -1) return { c: '—', h: '—' };
        const av = parseFloat(row[ai]), bv = parseFloat(row[bi]);
        if (isNaN(av) || isNaN(bv)) return { c: '—', h: '—' };
        return {
          c: Math.sqrt(av*av+bv*bv).toFixed(2),
          h: ((Math.atan2(bv,av)*180/Math.PI+360)%360).toFixed(1)
        };
      };

      document.getElementById('cmp-table-body').innerHTML = sortedIdx.map((origIdx, ri) => {
        const colorantCells = colorantCols.map(col => `<td style="${PR}">${col[ri]}</td>`).join('');
        const aLabCells = aLabCols.map((col, i) =>
          `<td onclick="showSpectral(event,${ri*2})" style="${PR}${i===0?VL:''}cursor:pointer;" title="Click to view spectral">${col[ri]}</td>`
        ).join('');
        const aCH = calcCH(matches[origIdx].rowA, aLabIdx);
        const aCHCells = `<td style="${PR}">${aCH.c}</td><td style="${PR}">${aCH.h}</td>`;
        const bLabCells = bLabCols.map((col, i) =>
          `<td onclick="showSpectral(event,${ri*2+1})" style="${PR}${i===0?VL:''}cursor:pointer;" title="Click to view spectral">${col[ri]}</td>`
        ).join('');
        const bCH = calcCH(matches[origIdx].rowB, bLabIdx);
        const bCHCells = `<td style="${PR}">${bCH.c}</td><td style="${PR}">${bCH.h}</td>`;
        return `<tr>${colorantCells}${aLabCells}${aCHCells}${bLabCells}${bCHCells}<td style="${PR}${VL}font-weight:bold;">${deCol[ri]}</td></tr>`;
      }).join('');
    }

    document.getElementById('compare-btn').addEventListener('click', () => {
      const { a, b } = state;
      const resultEl = document.getElementById('result');

      // Build lookup: colorant key → row from File B
      const bMap = new Map();
      for (const row of b.rows) {
        const key = colorantKey(row, b.headers, b.colorants);
        if (!bMap.has(key)) bMap.set(key, row);
      }

      // Collect all matching rows
      const matches = [];
      for (const row of a.rows) {
        const key = colorantKey(row, a.headers, a.colorants);
        if (bMap.has(key)) matches.push({ rowA: row, rowB: bMap.get(key) });
      }

      if (matches.length === 0) {
        resultEl.textContent = 'No matching device colorant rows found.';
        return;
      }

      const LAB = ['LAB_L', 'LAB_A', 'LAB_B'];
      const aLabIdx = LAB.map(l => a.headers.indexOf(l));
      const bLabIdx = LAB.map(l => b.headers.indexOf(l));
      const aColIdx = a.colorants.map(c => a.headers.indexOf(c));

      const method = deMethod.value;
      const PR = 'padding:4px 16px 4px 0;text-align:right;';
      const TH = 'font-weight:bold;border-bottom:2px solid #ddd;color:#555;';
      const VL = 'border-left:1px solid #ccc;padding-left:12px;';

      // Compute ΔE per match
      const deRaw = matches.map(({ rowA, rowB }) => {
        const aVals = aLabIdx.map(i => i !== -1 ? parseFloat(rowA[i]) : NaN);
        const bVals = bLabIdx.map(i => i !== -1 ? parseFloat(rowB[i]) : NaN);
        const [L1, a1, b1] = aVals, [L2, a2, b2] = bVals;
        return (!isNaN(L1) && !isNaN(a1) && !isNaN(b1) && !isNaN(L2) && !isNaN(a2) && !isNaN(b2))
          ? calcDeltaE(method, L1, a1, b1, L2, a2, b2).toFixed(2)
          : '—';
      });

      // Summary statistics
      const deNums = deRaw.filter(v => v !== '—').map(Number);
      const deMean = deNums.reduce((s, v) => s + v, 0) / deNums.length;
      const deMax  = Math.max(...deNums);
      const deStd  = Math.sqrt(deNums.reduce((s, v) => s + (v - deMean) ** 2, 0) / deNums.length);

      const summaryBox = `
        <div style="display:inline-flex;gap:32px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px 24px;margin-top:16px;font-size:13px;">
          <div><div style="color:#888;margin-bottom:2px;">Mean ${method}</div><div style="font-family:monospace;font-size:15px;font-weight:bold;">${deMean.toFixed(2)}</div></div>
          <div><div style="color:#888;margin-bottom:2px;">Max ${method}</div><div style="font-family:monospace;font-size:15px;font-weight:bold;">${deMax.toFixed(2)}</div></div>
          <div><div style="color:#888;margin-bottom:2px;">Std Dev</div><div style="font-family:monospace;font-size:15px;font-weight:bold;">${deStd.toFixed(2)}</div></div>
        </div>`;

      // Spanning header row
      const colorantSpan = a.colorants.length;
      const spanningRow = `<tr>
        <th colspan="${colorantSpan}" style="padding:4px 0;text-align:center;${TH}">Device Colorants</th>
        <th colspan="5" style="padding:4px 0;text-align:center;${TH}${VL}">File A</th>
        <th colspan="5" style="padding:4px 0;text-align:center;${TH}${VL}">File B</th>
        <th style="${PR}${TH}${VL}"></th>
      </tr>`;

      // Store data and reset sort state
      _cmpSortCol = null;
      _cmpSortDir = 'asc';
      _cmpData = { matches, deRaw, a, b, aColIdx, aLabIdx, bLabIdx, method, PR, TH, VL };
      _cmpSortedIdx = Array.from({ length: matches.length }, (_, i) => i);

      resultEl.innerHTML = `
        <p style="margin-bottom:8px;font-size:13px;color:#555;">${matches.length} matching row${matches.length !== 1 ? 's' : ''}</p>
        ${summaryBox}
        <div onclick="toggleValidate()" style="cursor:pointer;padding:8px 14px;background:#f0f2f5;border:1px solid #ddd;border-radius:6px 6px 0 0;font-size:13px;font-weight:bold;color:#555;margin-top:16px;display:flex;justify-content:space-between;align-items:center;user-select:none;">
          <span>Validate</span><span id="validate-arrow">▶</span>
        </div>
        <div id="validate-wrap" style="display:none;border:1px solid #ddd;border-top:none;border-radius:0 0 6px 6px;padding:12px;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <select id="validate-mode" onchange="updateValidateFileLabel()" style="padding:6px 10px;border:1px solid #bbb;border-bottom:3px solid #999;border-radius:6px;font-size:13px;color:#333;background:linear-gradient(to bottom,#f8f9fa,#e8eaed);box-shadow:0 2px 3px rgba(0,0,0,0.1),inset 0 1px 0 rgba(255,255,255,0.8);cursor:pointer;transition:all 0.08s ease;">
              <option value="g7">G7</option>
            </select>
            <select id="validate-file-select" style="padding:6px 10px;border:1px solid #bbb;border-bottom:3px solid #999;border-radius:6px;font-size:13px;color:#333;background:linear-gradient(to bottom,#f8f9fa,#e8eaed);box-shadow:0 2px 3px rgba(0,0,0,0.1),inset 0 1px 0 rgba(255,255,255,0.8);cursor:pointer;transition:all 0.08s ease;max-width:280px;"></select>
            <button class="validate-btn" onclick="validateFile()">Validate</button>
          </div>
          <div id="validate-result" style="font-size:13px;color:#333;background:#f8f9fa;border:1px solid #ddd;border-radius:6px;padding:10px;min-height:60px;overflow-x:auto;"></div>
        </div>
        <div onclick="toggleCmpTable()" style="cursor:pointer;padding:8px 14px;background:#f0f2f5;border:1px solid #ddd;border-radius:6px 6px 0 0;font-size:13px;font-weight:bold;color:#555;margin-top:16px;display:flex;justify-content:space-between;align-items:center;user-select:none;">
          <span>Comparison Table</span><span id="cmp-table-arrow">▶</span>
        </div>
        <div id="cmp-table-wrap" style="display:none;overflow-x:auto;border:1px solid #ddd;border-top:none;border-radius:0 0 6px 6px;padding:8px 0 8px 8px;">
          ${(a.hasSpectral || b.hasSpectral) ? '<div style="padding:4px 8px 8px;font-size:11px;color:#4a90e2;">Click on L*a*b* color to display spectral graph.</div>' : ''}
          <table style="border-collapse:collapse;font-size:13px;">
            <thead>${spanningRow}<tr id="cmp-col-headers"></tr></thead>
            <tbody id="cmp-table-body" style="font-family:monospace;color:#333;"></tbody>
          </table>
        </div>`;

      renderCmpTable();
      renderPlot();
      updateValidateFileLabel();
    });

    function togglePlot() {
      const wrap = document.getElementById('plot-wrap');
      const arrow = document.getElementById('plot-arrow');
      if (!wrap) return;
      const hidden = wrap.style.display === 'none';
      wrap.style.display = hidden ? '' : 'none';
      arrow.textContent = hidden ? '▼' : '▶';
    }

    function labToRgb(L, a, b) {
      // LAB → XYZ (D65 white point for sRGB)
      const Xn = 0.9505, Yn = 1.0000, Zn = 1.0890;
      const f = t => t > 0.008856 ? t ** 3 : (t - 16 / 116) / 7.787;
      const fy = (L + 16) / 116;
      const X = Xn * f(a / 500 + fy);
      const Y = Yn * f(fy);
      const Z = Zn * f(fy - b / 200);
      // XYZ → linear sRGB
      let r =  3.2406 * X - 1.5372 * Y - 0.4986 * Z;
      let g = -0.9689 * X + 1.8758 * Y + 0.0415 * Z;
      let bv =  0.0557 * X - 0.2040 * Y + 1.0570 * Z;
      // Gamma (sRGB)
      const gc = v => Math.min(1, Math.max(0, v <= 0.0031308 ? 12.92 * v : 1.055 * v ** (1 / 2.4) - 0.055));
      const toHex = v => Math.round(gc(v) * 255).toString(16).padStart(2, '0');
      return '#' + toHex(r) + toHex(g) + toHex(bv);
    }

    function onPlotColorChange(which) {
      if (which === 'hue' && document.getElementById('plot-opt-hue-color').checked)
        document.getElementById('plot-opt-value-color').checked = false;
      if (which === 'value' && document.getElementById('plot-opt-value-color').checked)
        document.getElementById('plot-opt-hue-color').checked = false;
      renderPlot();
    }

    function renderPlot() {
      const { a, b } = state;
      document.getElementById('plot-section').style.display = '';
      document.getElementById('plot-tab-label').textContent =
        _mode === 'explore' ? '3D Plot: ' + a.name : '3D Plot';
      const plotEl = document.getElementById('plot');

      const useCircles    = document.getElementById('plot-opt-circles')?.checked;
      const useHueColor   = document.getElementById('plot-opt-hue-color')?.checked;
      const useValueColor = document.getElementById('plot-opt-value-color')?.checked;

      // Show spectral checkbox only when at least one active dataset has spectral data
      const hasAnySpectral = a.hasSpectral || (_mode === 'compare' && b && b.hasSpectral);
      const spectralOptLabel = document.getElementById('plot-opt-spectral-label');
      if (spectralOptLabel) {
        spectralOptLabel.style.display = hasAnySpectral ? '' : 'none';
        if (!hasAnySpectral) {
          const cb = document.getElementById('plot-opt-spectral');
          if (cb) cb.checked = false;
        }
      }

      const hueToColor = (av, bv) => {
        const h = (Math.atan2(bv, av) * 180 / Math.PI + 360) % 360;
        return `hsl(${h.toFixed(1)},90%,45%)`;
      };

      // Build trace + record which original row index each plotted point came from
      const buildTrace = (data, name, defaultColor) => {
        const iA = data.headers.indexOf('LAB_A');
        const iB = data.headers.indexOf('LAB_B');
        const iL = data.headers.indexOf('LAB_L');
        const xs = [], ys = [], zs = [], colors = [], rowMap = [];
        data.rows.forEach((r, ri) => {
          const av = parseFloat(r[iA]), bv = parseFloat(r[iB]), l = parseFloat(r[iL]);
          if (!isNaN(av) && !isNaN(bv) && !isNaN(l)) {
            xs.push(av); ys.push(bv); zs.push(l);
            colors.push(useHueColor ? hueToColor(av, bv) : useValueColor ? labToRgb(l, av, bv) : defaultColor);
            rowMap.push(ri);
          }
        });
        return {
          tr: { type: 'scatter3d', mode: 'markers', name, x: xs, y: ys, z: zs,
                marker: { size: 3, color: colors, opacity: 0.8,
                          symbol: useCircles ? 'circle-open' : 'circle' } },
          rowMap
        };
      };

      // Build traces, preserving per-trace visibility across re-renders
      const traceSpecs = [{ data: a, name: a.name, color: '#4a90e2' }];
      if (_mode === 'compare' && b) traceSpecs.push({ data: b, name: b.name, color: '#e24a4a' });
      if (_plotVisible.length !== traceSpecs.length) _plotVisible = Array(traceSpecs.length).fill(true);

      _plotRowMap = [];
      const builtTraces = traceSpecs.map((spec, i) => {
        const built = buildTrace(spec.data, spec.name, spec.color);
        built.tr.visible = _plotVisible[i];
        built.tr.showlegend = false; // hide Plotly's built-in legend; we use a custom one
        _plotRowMap.push(built.rowMap);
        return built;
      });
      const traces = builtTraces.map(b => b.tr);

      // Compute fixed axis ranges from all datasets (regardless of visibility)
      let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity, zMin = Infinity, zMax = -Infinity;
      traces.forEach(tr => {
        tr.x.forEach(v => { if (v < xMin) xMin = v; if (v > xMax) xMax = v; });
        tr.y.forEach(v => { if (v < yMin) yMin = v; if (v > yMax) yMax = v; });
        tr.z.forEach(v => { if (v < zMin) zMin = v; if (v > zMax) zMax = v; });
      });
      const pad = (lo, hi) => { const d = (hi - lo) * 0.05 || 5; return [lo - d, hi + d]; };
      const xRange = (xMin === Infinity) ? [-128, 128] : pad(xMin, xMax);
      const yRange = (yMin === Infinity) ? [-128, 128] : pad(yMin, yMax);
      const zRange = (zMin === Infinity) ? [0, 100] : [Math.min(0, zMin), zMax + (zMax - zMin) * 0.05 || 5];
      _plotAxisRanges = { xRange, yRange, zRange };

      // Render custom legend for compare mode
      let customLegendEl = document.getElementById('plot-custom-legend');
      if (_mode === 'compare' && b) {
        if (!customLegendEl) {
          customLegendEl = document.createElement('div');
          customLegendEl.id = 'plot-custom-legend';
          customLegendEl.style.cssText = 'position:absolute;top:38px;left:12px;z-index:10;display:flex;flex-direction:column;gap:4px;';
          document.getElementById('plot-wrap').style.position = 'relative';
          document.getElementById('plot-wrap').appendChild(customLegendEl);
        }
        customLegendEl.innerHTML = traceSpecs.map((spec, i) => {
          const on = _plotVisible[i];
          return `<div onclick="togglePlotTrace(${i})" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:3px 8px;background:rgba(255,255,255,0.85);border:1px solid #ddd;border-radius:4px;font-size:12px;user-select:none;${on ? '' : 'opacity:0.45;'}">
            <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${spec.color};flex-shrink:0;${on ? '' : 'background:#aaa;'}"></span>
            <span style="${on ? 'color:#333;' : 'color:#999;text-decoration:line-through;'}">${spec.name}</span>
          </div>`;
        }).join('');
      } else if (customLegendEl) {
        customLegendEl.remove();
      }

      Plotly.react(plotEl, traces, {
        margin: { t: 30, r: 10, b: 10, l: 10 },
        scene: {
          xaxis: { title: 'a*', range: xRange },
          yaxis: { title: 'b*', range: yRange },
          zaxis: { title: 'L*', range: zRange }
        },
        showlegend: false,
        paper_bgcolor: '#fff'
      }, { responsive: true }).then(() => {
        // Attach plot click handler (remove previous one first)
        if (_plotClickHandler) plotEl.removeListener('plotly_click', _plotClickHandler);
        _plotClickHandler = function(evtData) {
          if (!document.getElementById('plot-opt-spectral')?.checked) return;
          if (!evtData.points || evtData.points.length === 0) return;
          const pt = evtData.points[0];
          const curveNum = pt.curveNumber;
          const ptNum = pt.pointNumber;
          const rowMap = _plotRowMap[curveNum];
          if (!rowMap) return;
          const rowIdx = rowMap[ptNum];
          if (rowIdx === undefined) return;
          const slot = curveNum === 0 ? a : b;
          const color = curveNum === 0 ? '#4a90e2' : '#e24a4a';
          const spec = extractSpectral(slot.headers, slot.rows[rowIdx]);
          _suppressDismiss = true;
          const cx = (pt.event && pt.event.clientX != null) ? pt.event.clientX : window.innerWidth  / 2;
          const cy = (pt.event && pt.event.clientY != null) ? pt.event.clientY : window.innerHeight / 2;
          showSpectralPopup(cx, cy, { wavelengths: spec.wavelengths, values: spec.values, label: buildSpectralLabel(slot.name, slot.headers, slot.rows[rowIdx], slot.colorants), color });
        };
        plotEl.on('plotly_click', _plotClickHandler);
      });
    }

    function togglePlotTrace(i) {
      const plotEl = document.getElementById('plot');
      if (!plotEl) return;
      _plotVisible[i] = !_plotVisible[i];
      const layout = _plotAxisRanges ? {
        'scene.xaxis.range': _plotAxisRanges.xRange,
        'scene.yaxis.range': _plotAxisRanges.yRange,
        'scene.zaxis.range': _plotAxisRanges.zRange
      } : {};
      Plotly.update(plotEl, { visible: [_plotVisible[i]] }, layout, [i]);
      // Refresh custom legend appearance without full re-render
      const items = document.querySelectorAll('#plot-custom-legend > div');
      const { a, b } = state;
      const colors = ['#4a90e2', '#e24a4a'];
      const names = [a ? a.name : '', b ? b.name : ''];
      items.forEach((el, idx) => {
        const on = _plotVisible[idx];
        el.style.opacity = on ? '' : '0.45';
        el.querySelector('span:first-child').style.background = on ? colors[idx] : '#aaa';
        const label = el.querySelector('span:last-child');
        label.style.color = on ? '#333' : '#999';
        label.style.textDecoration = on ? '' : 'line-through';
      });
    }
  </script>

    onclick="document.getElementById('main-content').scrollTo({top:0,behavior:'smooth'})">&#8679; Top</button>

             width:80vw;max-width:1100px;height:88vh;

             display:flex;flex-direction:column;">
      <div style="display:flex;align-items:center;justify-content:space-between;
                  padding:12px 16px;border-bottom:1px solid #ddd;flex-shrink:0;">
